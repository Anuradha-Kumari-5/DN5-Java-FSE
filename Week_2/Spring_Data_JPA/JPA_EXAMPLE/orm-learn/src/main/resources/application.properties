# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate

# NOTE: the assignment specifies
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
# MySQL5Dialect is deprecated as of Hibernate 5.2+ and was removed
# entirely in Hibernate 6 (used by Spring Boot 3). Since MySQL Server
# 8.0 is the stated pre-requisite here, MySQL8Dialect is the correct,
# non-deprecated match -- Hibernate will still auto-detect the right
# dialect from the JDBC connection even if this line is left out
# entirely, but it's set explicitly below to mirror what the assignment
# asked for while avoiding a deprecation warning at startup.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
