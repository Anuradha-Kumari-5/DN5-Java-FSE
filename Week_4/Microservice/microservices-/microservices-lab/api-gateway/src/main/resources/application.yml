spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: greet-service
          uri: lb://greet-service
          predicates:
            - Path=/greet/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.cognizant.apigateway: INFO
    org.springframework.cloud.gateway: INFO
