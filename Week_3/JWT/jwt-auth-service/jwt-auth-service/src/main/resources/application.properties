# The assignment's curl example targets port 8090
server.port=8090

spring.application.name=jwt-auth-service

# HMAC-SHA256 needs a secret at least 256 bits (32 bytes) long.
# In a real deployment this MUST come from an environment variable or a
# secrets manager, never be committed to source control.
jwt.secret=ChangeThisSecretKeyBeforeAnyRealDeployment123456

# Token validity: 1,200,000 ms = 20 minutes
jwt.expiration-ms=1200000

logging.level.com.cognizant.jwtauth=INFO
